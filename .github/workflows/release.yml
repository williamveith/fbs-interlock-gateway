name: Validate, Tag, and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.4.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Validate, Tag, and Release
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Require main branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Releases must be created from the main branch."
            echo "Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Import release-signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: 6FC7BEA18A448C13F2C844889DEFAA30FF6AFF07
          git_user_signingkey: true
          git_tag_gpgsign: true
          git_committer_name: William Veith
          git_committer_email: william.veith@gmail.com

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version
        id: version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}"
            echo "Expected a version such as v1.4.0"
            exit 1
          fi

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag already exists: ${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Verify repository
        run: make verify

      - name: Build release assets
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          make clean

          make release \
            VERSION="${VERSION}" \
            COMMIT="${GITHUB_SHA::7}" \
            DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Verify release files exist
        shell: bash
        run: |
          set -euo pipefail

          files=(
            "build/release/fbs-interlock-gateway-linux-amd64"
            "build/release/fbs-interlock-gateway-linux-amd64.sha256"
            "build/release/fbs-interlock-gateway-linux-arm64"
            "build/release/fbs-interlock-gateway-linux-arm64.sha256"
            "build/release/fbs-interlock-gateway-windows-amd64.exe"
            "build/release/fbs-interlock-gateway-windows-amd64.exe.sha256"
            "build/release/fbs-interlock-gateway-darwin-arm64"
            "build/release/fbs-interlock-gateway-darwin-arm64.sha256"
            "build/release/fbs-interlock-gateway-darwin-amd64"
            "build/release/fbs-interlock-gateway-darwin-amd64.sha256"
          )

          for file in "${files[@]}"; do
            if [[ ! -f "${file}" ]]; then
              echo "Missing release file: ${file}"
              exit 1
            fi
          done

      - name: Verify checksums
        working-directory: build/release
        shell: bash
        run: |
          set -euo pipefail

          sha256sum --check fbs-interlock-gateway-linux-amd64.sha256
          sha256sum --check fbs-interlock-gateway-linux-arm64.sha256
          sha256sum --check fbs-interlock-gateway-windows-amd64.exe.sha256
          sha256sum --check fbs-interlock-gateway-darwin-arm64.sha256
          sha256sum --check fbs-interlock-gateway-darwin-amd64.sha256

      - name: Verify binary formats
        shell: bash
        run: |
          set -euo pipefail

          file build/release/fbs-interlock-gateway-linux-amd64 \
            | grep -Eq "ELF 64-bit.*x86-64"

          file build/release/fbs-interlock-gateway-linux-arm64 \
            | grep -Eq "ELF 64-bit.*ARM aarch64"

          file build/release/fbs-interlock-gateway-windows-amd64.exe \
            | grep -Eq "PE32\+ executable.*x86-64"

          file build/release/fbs-interlock-gateway-darwin-arm64 \
            | grep -Eiq "Mach-O 64-bit.*(arm64|aarch64).*executable"

          file build/release/fbs-interlock-gateway-darwin-amd64 \
            | grep -Eiq "Mach-O 64-bit.*x86_64.*executable"

      - name: Verify embedded version
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          output="$(
            ./build/release/fbs-interlock-gateway-linux-amd64 -version
          )"

          echo "${output}"

          if [[ "${output}" != *"version=${VERSION}"* ]]; then
            echo "Expected binary version ${VERSION}"
            exit 1
          fi

          if [[ "${output}" != *"commit=${GITHUB_SHA::7}"* ]]; then
            echo "Expected binary commit ${GITHUB_SHA::7}"
            exit 1
          fi

      - name: Ensure repository is unchanged
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "The build modified tracked repository files:"
            git status --short
            git diff
            exit 1
          fi

      - name: Create, verify, and push signed tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git tag \
            --sign "${VERSION}" \
            --message "Release ${VERSION}" \
            "${GITHUB_SHA}"

          echo "Verifying tag signature..."
          git verify-tag "${VERSION}"

          git push origin "refs/tags/${VERSION}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          gh release create "${VERSION}" \
            build/release/fbs-interlock-gateway-linux-amd64 \
            build/release/fbs-interlock-gateway-linux-amd64.sha256 \
            build/release/fbs-interlock-gateway-linux-arm64 \
            build/release/fbs-interlock-gateway-linux-arm64.sha256 \
            build/release/fbs-interlock-gateway-windows-amd64.exe \
            build/release/fbs-interlock-gateway-windows-amd64.exe.sha256 \
            build/release/fbs-interlock-gateway-darwin-arm64 \
            build/release/fbs-interlock-gateway-darwin-arm64.sha256 \
            build/release/fbs-interlock-gateway-darwin-amd64 \
            build/release/fbs-interlock-gateway-darwin-amd64.sha256 \
            --verify-tag \
            --generate-notes \
            --title "${VERSION}"