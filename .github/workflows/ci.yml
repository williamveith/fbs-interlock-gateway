name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify repository
        run: make verify

      - name: Smoke-test Linux AMD64 binary
        shell: bash
        run: |
          set -euo pipefail

          output="$(
            ./build/ci/fbs-interlock-gateway-linux-amd64 -version
          )"

          echo "${output}"

          grep -q \
            "fbs-interlock-gateway version=" \
            <<< "${output}"

      - name: Inspect binary formats
        shell: bash
        run: |
          set -euo pipefail

          file build/ci/fbs-interlock-gateway-linux-amd64 \
            | grep -Eq "ELF 64-bit.*x86-64"

          file build/ci/fbs-interlock-gateway-linux-arm64 \
            | grep -Eq "ELF 64-bit.*ARM aarch64"

          file build/ci/fbs-interlock-gateway-windows-amd64.exe \
            | grep -Eq "PE32\+ executable.*x86-64"

          file build/ci/fbs-interlock-gateway-darwin-arm64 \
            | grep -Eiq "Mach-O 64-bit.*(arm64|aarch64).*executable"

          file build/ci/fbs-interlock-gateway-darwin-amd64 \
            | grep -Eiq "Mach-O 64-bit.*x86_64.*executable"